name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsqlite3-dev nvidia-cuda-toolkit

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package .deb
        run: |
          cd build
          cpack -G DEB
          # Rename to consistent filename
          mv gpuwatch-*.deb gpuwatch-amd64.deb

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/gpuwatch-amd64.deb
          generate_release_notes: true
